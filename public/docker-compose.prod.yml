version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saasguard
      POSTGRES_USER: saasguard
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/tuyencaovn/saasguard.tech/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: saasguard
      DATABASE_USER: saasguard
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3006}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      APP_NAME: ${APP_NAME:-SaaSGuard}
    ports:
      - "3005:3005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/tuyencaovn/saasguard.tech/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-SaaSGuard}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3005}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3005}
      PORT: 3006
      HOSTNAME: 0.0.0.0
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3006/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db_data:
