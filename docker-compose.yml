services:
  postgres:
    image: postgres:16-alpine
    container_name: saasguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saasguard_dev
      POSTGRES_USER: saasguard
      POSTGRES_PASSWORD: saasguard_dev_2025
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasguard"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
